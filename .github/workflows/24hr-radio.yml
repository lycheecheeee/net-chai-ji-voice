name: 24hr Cantonese Finance Radio

on:
  schedule:
    # 每小時整點觸發 (UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch:  # 手動觸發
    inputs:
      hour:
        description: '指定時段 (0-23)，留空則使用當前時間'
        required: false
        default: ''

env:
  BIGMODEL_API_KEY: ${{ secrets.BIGMODEL_API_KEY }}
  CANTONESE_API_KEY: ${{ secrets.CANTONESE_API_KEY }}

jobs:
  generate-radio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser

      - name: Generate radio broadcast
        run: |
          echo "📻 開始生成廣播節目..."
          python main.py

      - name: List generated files
        run: |
          echo "📁 生成的文件:"
          ls -la broadcasts/ || echo "無 broadcasts 目錄"

      - name: Upload broadcast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: broadcast-${{ github.run_number }}
          path: broadcasts/
          retention-days: 7

      - name: Commit broadcast files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add broadcasts/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "📻 Auto-generate radio broadcast [skip ci]"
          git push || true

  # 可選：同時調用 Vercel API 生成
  trigger-vercel-api:
    runs-on: ubuntu-latest
    needs: generate-radio

    steps:
      - name: Get current hour
        id: time
        run: echo "hour=$(date -u +%H)" >> $GITHUB_OUTPUT

      - name: Trigger Vercel Radio API
        run: |
          HOUR=${{ steps.time.outputs.hour }}
          echo "🔔 觸發 Vercel API 生成 ${HOUR}:00 節目..."

          curl -X POST "https://net-zhi-ji-voice-api.vercel.app/api/radio" \
            -H "Content-Type: application/json" \
            -d "{\"broadcastType\": \"finance\", \"hour\": ${HOUR}}" \
            --max-time 120 \
            -o /tmp/radio_response.json \
            -w "HTTP Status: %{http_code}\n"

          echo "📄 API 響應:"
          cat /tmp/radio_response.json | head -c 500

      - name: Upload API response
        uses: actions/upload-artifact@v4
        with:
          name: vercel-api-response-${{ github.run_number }}
          path: /tmp/radio_response.json
          retention-days: 1
